<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Data Quality Inspector</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #0f172a;
            color: #e2e8f0;
        }

        header {
            padding: 40px;
            text-align: center;
            background: #1e293b;
        }

        h1 {
            margin: 0;
            font-size: 32px;
        }

        section {
            max-width: 900px;
            margin: auto;
            padding: 30px;
        }

        .card {
            background: #1e293b;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .highlight {
            color: #38bdf8;
            font-weight: bold;
        }

        .grid {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .kpi {
            flex: 1;
            text-align: center;
            min-width: 150px;
        }
    </style>
</head>

<body>

<header>
    <h1>📊 Data Quality Inspector</h1>
    <p>Dashboard de Análise de Qualidade de Dados</p>
</header>

<section>

    <!-- KPI DASHBOARD -->
    <div class="card">
        <h2>📊 Visão Geral</h2>

        <div class="grid">

            <div class="card kpi">
                <h3>❌ Nulos</h3>
                <p id="missing">...</p>
            </div>

            <div class="card kpi">
                <h3>🔁 Duplicados</h3>
                <p id="duplicates">...</p>
            </div>

            <div class="card kpi">
                <h3>📄 Válidos</h3>
                <p id="valid">...</p>
            </div>

            <div class="card kpi">
                <h3>🧠 Score</h3>
                <p class="highlight">80.50</p>
            </div>

        </div>
    </div>

    <!-- INSIGHT -->
    <div class="card">
        <h2>📈 Insight Automático</h2>
        <p>
            O dataset apresenta inconsistências moderadas e precisa de limpeza antes de modelagem.
        </p>
    </div>

    <!-- GRÁFICO -->
    <div class="card">
        <h2>📊 Distribuição de Qualidade</h2>
        <canvas id="qualityChart"></canvas>
    </div>

</section>

<!-- SCRIPT -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
fetch("data/quality_summary.json")
  .then(res => res.json())
  .then(data => {

    // KPIs
    document.getElementById("missing").innerText = data.missing;
    document.getElementById("duplicates").innerText = data.duplicates;
    document.getElementById("valid").innerText = data.valid;

    // GRÁFICO
    const ctx = document.getElementById('qualityChart');

    new Chart(ctx, {
        type: 'bar',
        data: {
            labels: ['Ausentes', 'Duplicados', 'Válidos'],
            datasets: [{
                label: 'Quantidade',
                data: [data.missing, data.duplicates, data.valid],
            }]
        }
    });

  })
  .catch(err => console.error("Erro ao carregar JSON:", err));
</script>

</body>
</html>
