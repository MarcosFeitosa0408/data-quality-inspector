<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Data Quality Inspector</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: #0f172a;
    color: #e2e8f0;
}

header {
    padding: 40px;
    text-align: center;
    background: #1e293b;
}

section {
    max-width: 1000px;
    margin: auto;
    padding: 30px;
}

/* DASHBOARD GRID (mais profissional que flex simples) */
.kpi-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
}

/* KPI CARD */
.kpi {
    background: #1e293b;
    padding: 20px;
    border-radius: 10px;
    text-align: center;
}

/* CARDS GERAIS */
.card {
    background: #1e293b;
    padding: 20px;
    border-radius: 10px;
    margin-top: 20px;
}

.highlight {
    color: #38bdf8;
    font-weight: bold;
}

/* RESPONSIVO */
@media (max-width: 800px) {
    .kpi-grid {
        grid-template-columns: 1fr 1fr;
    }
}
</style>
</head>

<body>

<header>
<h1>📊 Data Quality Inspector</h1>
<p>Dashboard de Análise de Qualidade de Dados</p>
</header>

<section>

<!-- KPIs -->
<div class="kpi-grid">

    <div class="kpi">
        <h3>❌ Nulos</h3>
        <h2 id="missing">...</h2>
    </div>

    <div class="kpi">
        <h3>🔁 Duplicados</h3>
        <h2 id="duplicates">...</h2>
    </div>

    <div class="kpi">
        <h3>📄 Válidos</h3>
        <h2 id="valid">...</h2>
    </div>

    <div class="kpi">
        <h3>🧠 Score</h3>
        <h2 id="score" class="highlight">...</h2>
    </div>

</div>

<!-- INSIGHT -->
<div class="card">
<h2>📈 Insight Automático</h2>
<p>
O dataset apresenta inconsistências moderadas e precisa de limpeza antes de modelagem.
</p>
</div>

<!-- GRÁFICO -->
<div class="card">
<h2>📊 Distribuição de Qualidade</h2>
<canvas id="qualityChart"></canvas>
</div>

</section>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
fetch("data/quality_summary.json")
.then(res => res.json())
.then(data => {

    // KPIs
    document.getElementById("missing").innerText = data.missing;
    document.getElementById("duplicates").innerText = data.duplicates;
    document.getElementById("valid").innerText = data.valid;

    // SCORE (melhor prática: vir do Python depois)
    const score = ((data.valid / (data.valid + data.missing)) * 100).toFixed(2);
    document.getElementById("score").innerText = score;

    // GRÁFICO
    const ctx = document.getElementById('qualityChart');

    new Chart(ctx, {
        type: 'bar',
        data: {
            labels: ['Ausentes', 'Duplicados', 'Válidos'],
            datasets: [{
                label: 'Quantidade',
                data: [data.missing, data.duplicates, data.valid],
            }]
        }
    });

})
.catch(err => console.error("Erro ao carregar JSON:", err));
</script>

</body>
</html>
